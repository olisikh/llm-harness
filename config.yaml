---
sources:
  obsidian-skills:
    type: submodule
    root: skills
    harness: agents

  mattpocock-skills:
    type: submodule
    root: skills
    harness: agents
    exclude:
      - deprecated/
      - personal/obsidian-vault
      - productivity/handoff
    overrides:
      misc/git-guardrails-claude-code: claude
      in-progress/claude-handoff: claude

  llm-wiki:
    type: submodule
    sources:
      - root: claude-plugin/skills
        harness: claude
      - root: plugins/llm-wiki-opencode/skills
        harness: opencode
      - root: plugins/llm-wiki/skills
        harness: codex

  awesome-llm-skills:
    type: submodule
    exclude:
      - document-skills/
    overrides:
      algorithmic-art: claude
    sources:
      - root: .
        harness: agents
      - root: document-skills
        harness: agents

  caveman:
    type: submodule
    root: skills
    harness: agents
    exclude:
      - caveman-compress
      - caveman-stats

  self-improving-agent:
    type: submodule
    root: .
    harness: openclaw

  graphify:
    type: submodule
    install:
      - uv tool install --editable .
      - graphify --help
    artifacts:
      - from: graphify/skill.md
        harness: claude
        to: skills/graphify/SKILL.md
      - from: graphify/skills/claude/references
        harness: claude
        to: skills/graphify/references
      - from: graphify/skill-agents.md
        harness: agents
        to: skills/graphify/SKILL.md
      - from: graphify/skills/agents/references
        harness: agents
        to: skills/graphify/references
      - from: graphify/skill-codex.md
        harness: codex
        to: skills/graphify/SKILL.md
      - from: graphify/skills/codex/references
        harness: codex
        to: skills/graphify/references
      - from: graphify/skill-opencode.md
        harness: opencode
        to: skills/graphify/SKILL.md
      - from: graphify/skills/opencode/references
        harness: opencode
        to: skills/graphify/references
      - from: graphify/skill-claw.md
        harness: hermes
        to: skills/graphify/SKILL.md
      - from: graphify/skills/claw/references
        harness: hermes
        to: skills/graphify/references

  local-skills/agents:
    type: local
    root: .
    harness: agents

  local-skills/claude:
    type: local
    root: .
    harness: claude

  local-skills/codex:
    type: local
    root: .
    harness: codex

  local-skills/hermes:
    type: local
    root: .
    harness: hermes
