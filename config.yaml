---
sources:
  obsidian-skills:
    type: submodule
    root: skills
    harness: agents

  mattpocock-skills:
    type: submodule
    root: skills
    harness: agents
    exclude:
      - deprecated/
    overrides:
      misc/git-guardrails-claude-code: claude

  llm-wiki:
    type: submodule
    sources:
      - root: claude-plugin/skills
        harness: claude
      - root: plugins/llm-wiki-opencode/skills
        harness: opencode
      - root: plugins/llm-wiki/skills
        harness: codex

  awesome-llm-skills:
    type: submodule
    exclude:
      - document-skills/
    overrides:
      algorithmic-art: claude
    sources:
      - root: .
        harness: agents
      - root: document-skills
        harness: agents

  caveman:
    type: submodule
    root: skills
    harness: agents

  self-improving-agent:
    type: submodule
    root: .
    harness: openclaw

  local-skills/agents:
    type: local
    root: .
    harness: agents

  local-skills/claude:
    type: local
    root: .
    harness: claude

  local-skills/codex:
    type: local
    root: .
    harness: codex

  local-skills/hermes:
    type: local
    root: .
    harness: hermes
